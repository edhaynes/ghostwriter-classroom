apiVersion: apps/v1
kind: Deployment
metadata:
  name: ghostwriter-classroom
  namespace: ghostwriter-classroom
  labels:
    app: ghostwriter-classroom
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ghostwriter-classroom
  template:
    metadata:
      labels:
        app: ghostwriter-classroom
    spec:
      containers:
        - name: classroom
          image: image-registry.openshift-image-registry.svc:5000/ghostwriter-classroom/classroom:latest
          ports:
            - containerPort: 8081
          env:
            - name: REDIS_URL
              value: "redis://redis:6379"
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: classroom-secrets
                  key: groq-api-key
            - name: CLASSROOM_KSERVE_ENDPOINT
              value: "https://api.groq.com/openai/v1"
            - name: CLASSROOM_MODEL
              value: "llama-3.3-70b-versatile"
            - name: ENABLE_IDLE_SHUTDOWN
              value: "true"
            - name: IDLE_TIMEOUT_SECONDS
              value: "3600"  # 1 hour
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ghostwriter-classroom
  namespace: ghostwriter-classroom
  labels:
    app: ghostwriter-classroom
spec:
  ports:
    - port: 8081
      targetPort: 8081
      name: http
  selector:
    app: ghostwriter-classroom
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: classroom
  namespace: ghostwriter-classroom
  labels:
    app: ghostwriter-classroom
spec:
  to:
    kind: Service
    name: ghostwriter-classroom
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
